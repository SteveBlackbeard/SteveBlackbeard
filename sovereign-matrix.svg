<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 260" width="100%" height="260">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&amp;family=Fira+Code:wght@400;600&amp;display=swap');
      
      .panel-bg { fill: #070B14; stroke: #1E293B; stroke-width: 1.5; }
      .panel-header { fill: #0F172A; stroke: #334155; stroke-width: 1; }
      
      .col-title {
        font-family: 'Nebula', 'Orbitron', monospace;
        font-weight: 800;
        font-size: 14px;
        fill: #FFFFFF;
        stroke: #000000;
        stroke-width: 1px;
        letter-spacing: 2px;
      }
      
      .col-tag {
        font-family: 'Fira Code', monospace;
        font-weight: 600;
        font-size: 11px;
        fill: #00F0FF;
        letter-spacing: 1.5px;
      }

      .bullet-text {
        font-family: 'Fira Code', monospace;
        font-size: 12px;
        fill: #CBD5E1;
        letter-spacing: 0.5px;
      }
      
      .status-pulse {
        animation: pulse 1.8s infinite;
      }

      @keyframes pulse {
        0% { fill: #00F0FF; opacity: 1; }
        50% { fill: #7000FF; opacity: 0.3; }
        100% { fill: #00F0FF; opacity: 1; }
      }
    </style>

    <linearGradient id="panel-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#050810" />
    </linearGradient>
  </defs>

  <rect width="950" height="260" rx="12" fill="#030508" stroke="#0F172A" stroke-width="2"/>

  <!-- COLUMN 1 -->
  <g transform="translate(25, 20)">
    <rect width="280" height="220" rx="8" class="panel-bg" />
    <rect width="280" height="38" rx="8" class="panel-header" />
    <circle cx="20" cy="19" r="4" class="status-pulse" />
    <text x="34" y="24" class="col-title">01. LOCAL-FIRST</text>
    <text x="210" y="23" class="col-tag">[SOVEREIGN]</text>
    
    <text x="20" y="70" class="bullet-text">▪ Zero external dependencies.</text>
    <text x="20" y="98" class="bullet-text">▪ Deterministic compute engine.</text>
    <text x="20" y="126" class="bullet-text">▪ Frugal bare-metal allocation.</text>
    <text x="20" y="154" class="bullet-text">▪ Isolated sandbox execution.</text>
    <text x="20" y="182" class="bullet-text">▪ Zero-latency local data.</text>

    <line x1="20" y1="200" x2="260" y2="200" stroke="#00F0FF" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- COLUMN 2 -->
  <g transform="translate(335, 20)">
    <rect width="280" height="220" rx="8" class="panel-bg" />
    <rect width="280" height="38" rx="8" class="panel-header" />
    <circle cx="20" cy="19" r="4" class="status-pulse" />
    <text x="34" y="24" class="col-title">02. GPU TELEMETRY</text>
    <text x="220" y="23" class="col-tag">[60 FPS]</text>
    
    <text x="20" y="70" class="bullet-text">▪ Custom GLSL vertex shaders.</text>
    <text x="20" y="98" class="bullet-text">▪ Float32Array buffer geometry.</text>
    <text x="20" y="126" class="bullet-text">▪ WebGL/WebGPU physics engine.</text>
    <text x="20" y="154" class="bullet-text">▪ Real-time visual HUDs.</text>
    <text x="20" y="182" class="bullet-text">▪ Glassmorphic UI pipelines.</text>

    <line x1="20" y1="200" x2="260" y2="200" stroke="#7000FF" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- COLUMN 3 -->
  <g transform="translate(645, 20)">
    <rect width="280" height="220" rx="8" class="panel-bg" />
    <rect width="280" height="38" rx="8" class="panel-header" />
    <circle cx="20" cy="19" r="4" class="status-pulse" />
    <text x="34" y="24" class="col-title">03. CONTROL MATH</text>
    <text x="210" y="23" class="col-tag">[OPTIMAL]</text>
    
    <text x="20" y="70" class="bullet-text">▪ Multidisciplinary control loops.</text>
    <text x="20" y="98" class="bullet-text">▪ Discrete math optimization.</text>
    <text x="20" y="126" class="bullet-text">▪ Autonomous agentic logic.</text>
    <text x="20" y="154" class="bullet-text">▪ Pre-tested regression suites.</text>
    <text x="20" y="182" class="bullet-text">▪ Dark ops system integrity.</text>

    <line x1="20" y1="200" x2="260" y2="200" stroke="#00F0FF" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
