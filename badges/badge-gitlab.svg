<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 115 32" width="115" height="32">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&amp;display=swap');
      .tech-text {
        font-family: 'Fira Code', monospace;
        font-weight: 700;
        font-size: 11px;
        fill: #FFFFFF !important;
        stroke: #000000;
        stroke-width: 1.2px;
        paint-order: stroke fill;
        letter-spacing: 1px;
      }
      .sheen-move {
        animation: moveSheen 3.2s ease-in-out infinite alternate;
      }
      @keyframes moveSheen {
        0% { transform: translateX(-115px); }
        100% { transform: translateX(115px); }
      }
    </style>

    <clipPath id="tech-clip">
      <rect width="115" height="32" rx="7" />
    </clipPath>

    <linearGradient id="bg-obsidian" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#142138" />
      <stop offset="50%" stop-color="#080D1A" />
      <stop offset="100%" stop-color="#03050A" />
    </linearGradient>

    <linearGradient id="moving-sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <g clip-path="url(#tech-clip)">
    <rect width="115" height="32" rx="7" fill="url(#bg-obsidian)" stroke="#1E293B" stroke-width="1.5"/>

    <g class="sheen-move">
      <polygon points="20,0 70,0 35,32 -15,32" fill="url(#moving-sheen)" />
    </g>

    <rect x="2" y="2" width="111" height="28" rx="5" fill="none" stroke="#FF7700" stroke-width="1" opacity="0.8"/>
    <rect x="4" y="4" width="107" height="24" rx="4" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.4"/>

    <text x="57.5" y="20" text-anchor="middle" class="tech-text">GitLab</text>
  </g>
</svg>