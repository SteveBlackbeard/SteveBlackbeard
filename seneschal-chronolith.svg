<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 360" width="100%" height="360">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Fira+Code:wght@500;700&amp;display=swap');
      
      .main-title {
        font-family: 'Nebula', 'Orbitron', monospace;
        font-weight: 900;
        font-size: 18px;
        fill: #FFFFFF;
        stroke: #000000;
        stroke-width: 2px;
        paint-order: stroke fill;
        letter-spacing: 3px;
        filter: drop-shadow(0 0 8px rgba(0, 255, 157, 0.7));
      }

      .archetype-title {
        font-family: 'Nebula', 'Orbitron', monospace;
        font-weight: 800;
        font-size: 12.5px;
        fill: #FFFFFF;
        stroke: #000000;
        stroke-width: 1.5px;
        letter-spacing: 1.5px;
      }
      
      .archetype-desc {
        font-family: 'Fira Code', monospace;
        font-size: 10.5px;
        fill: #CBD5E1;
        letter-spacing: 0.5px;
      }
      
      .tag-text {
        font-family: 'Fira Code', monospace;
        font-size: 9.5px;
        fill: #00FF9D;
        letter-spacing: 1px;
      }

      .pulse-ring {
        transform-origin: center;
        animation: rotateRing 12s linear infinite;
      }

      @keyframes rotateRing {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .glow-node {
        animation: nodePulse 2s ease-in-out infinite alternate;
      }

      @keyframes nodePulse {
        0% { filter: drop-shadow(0 0 4px #00F0FF); opacity: 0.8; }
        100% { filter: drop-shadow(0 0 12px #00FF9D); opacity: 1; }
      }
    </style>

    <!-- Obsidian Crystal Shader Gradients -->
    <linearGradient id="obsidian-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020306" />
      <stop offset="40%" stop-color="#070B14" />
      <stop offset="100%" stop-color="#010204" />
    </linearGradient>

    <linearGradient id="chronolith-crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="30%" stop-color="#7000FF" />
      <stop offset="70%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#00FF9D" />
    </linearGradient>

    <linearGradient id="glass-sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18" />
      <stop offset="25%" stop-color="#FFFFFF" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Outer HUD Frame -->
  <rect width="950" height="360" rx="14" fill="url(#obsidian-bg)" stroke="#1E293B" stroke-width="2"/>
  <path d="M 0 0 L 950 0 L 650 360 L 0 360 Z" fill="url(#glass-sheen)" opacity="0.4"/>

  <!-- Top Title Banner Header -->
  <rect x="30" y="20" width="890" height="36" rx="6" fill="#060A14" stroke="#334155" stroke-width="1.5"/>
  <text x="475" y="44" text-anchor="middle" class="main-title">THE SENESCHAL CHRONOLITH // SYNERGISTIC ARCHETYPAL MATRIX</text>

  <!-- CENTRAL CHRONOLITH MONOLITH CORE (X: 475, Y: 200) -->
  <g transform="translate(475, 200)">
    <!-- Outer Cybernetic Ring -->
    <circle r="75" fill="none" stroke="#1E293B" stroke-width="2" stroke-dasharray="8 6"/>
    <circle r="65" fill="none" stroke="#00F0FF" stroke-width="1.5" stroke-dasharray="14 8" opacity="0.8"/>
    <circle r="55" fill="none" stroke="#7000FF" stroke-width="2" stroke-dasharray="20 10"/>

    <!-- Central Diamond Monolith Crystal -->
    <polygon points="0,-45 35,0 0,45 -35,0" fill="url(#chronolith-crystal)" stroke="#FFFFFF" stroke-width="1.5" filter="drop-shadow(0 0 14px #00F0FF)" />
    <polygon points="0,-45 15,0 0,45 -15,0" fill="#FFFFFF" opacity="0.25"/>

    <!-- Core Eye Node -->
    <circle r="6" fill="#00FF9D" class="glow-node"/>
    
    <!-- Pulse Ring Effect -->
    <circle r="85" fill="none" stroke="#00FF9D" stroke-width="1" opacity="0.3" stroke-dasharray="4 12"/>
  </g>

  <!-- ENERGY CONDUIT CONNECTORS -->
  <!-- Top Left Line -->
  <path d="M 270 120 L 415 165" stroke="#00F0FF" stroke-width="1.5" stroke-dasharray="6 4" />
  <!-- Bottom Left Line -->
  <path d="M 270 280 L 415 235" stroke="#7000FF" stroke-width="1.5" stroke-dasharray="6 4" />
  <!-- Top Right Line -->
  <path d="M 680 120 L 535 165" stroke="#00FF9D" stroke-width="1.5" stroke-dasharray="6 4" />
  <!-- Bottom Right Line -->
  <path d="M 680 280 L 535 235" stroke="#00F0FF" stroke-width="1.5" stroke-dasharray="6 4" />

  <!-- ARCHETYPE NODE 01: THE SENESCHAL (Top Left) -->
  <g transform="translate(30, 80)">
    <rect width="250" height="85" rx="8" fill="#050914" stroke="#00F0FF" stroke-width="1.5" />
    <path d="M 0 0 L 250 0 L 170 85 L 0 85 Z" fill="url(#glass-sheen)" opacity="0.5"/>
    <text x="15" y="26" class="archetype-title">🏛️ 01. THE SENESCHAL</text>
    <rect x="160" y="10" width="75" height="18" rx="3" fill="#0B132B" stroke="#00F0FF" stroke-width="1"/>
    <text x="197" y="22" text-anchor="middle" class="tag-text">[PROTOCOL]</text>
    <text x="15" y="48" class="archetype-desc">Sovereign Architecture &amp;</text>
    <text x="15" y="66" class="archetype-desc">Systemic Governance Core.</text>
  </g>

  <!-- ARCHETYPE NODE 02: THE CHRONOLITH (Bottom Left) -->
  <g transform="translate(30, 240)">
    <rect width="250" height="85" rx="8" fill="#050914" stroke="#7000FF" stroke-width="1.5" />
    <path d="M 0 0 L 250 0 L 170 85 L 0 85 Z" fill="url(#glass-sheen)" opacity="0.5"/>
    <text x="15" y="26" class="archetype-title">⏳ 02. THE CHRONOLITH</text>
    <rect x="160" y="10" width="75" height="18" rx="3" fill="#0B132B" stroke="#7000FF" stroke-width="1"/>
    <text x="197" y="22" text-anchor="middle" class="tag-text" fill="#7000FF">[TEMPORAL]</text>
    <text x="15" y="48" class="archetype-desc">Deterministic Execution &amp;</text>
    <text x="15" y="66" class="archetype-desc">Low-Latency Compute Matrix.</text>
  </g>

  <!-- ARCHETYPE NODE 03: THE SHADER KINETIC (Top Right) -->
  <g transform="translate(670, 80)">
    <rect width="250" height="85" rx="8" fill="#050914" stroke="#00FF9D" stroke-width="1.5" />
    <path d="M 0 0 L 250 0 L 170 85 L 0 85 Z" fill="url(#glass-sheen)" opacity="0.5"/>
    <text x="15" y="26" class="archetype-title">⚡ 03. SHADER KINETIC</text>
    <rect x="160" y="10" width="75" height="18" rx="3" fill="#0B132B" stroke="#00FF9D" stroke-width="1"/>
    <text x="197" y="22" text-anchor="middle" class="tag-text" fill="#00FF9D">[60FPS_GPU]</text>
    <text x="15" y="48" class="archetype-desc">Hardware Particle Dynamics &amp;</text>
    <text x="15" y="66" class="archetype-desc">WebGL/WebGPU Optics Engine.</text>
  </g>

  <!-- ARCHETYPE NODE 04: THE SYNTHESIZER (Bottom Right) -->
  <g transform="translate(670, 240)">
    <rect width="250" height="85" rx="8" fill="#050914" stroke="#00F0FF" stroke-width="1.5" />
    <path d="M 0 0 L 250 0 L 170 85 L 0 85 Z" fill="url(#glass-sheen)" opacity="0.5"/>
    <text x="15" y="26" class="archetype-title">🧠 04. THE SYNTHESIZER</text>
    <rect x="160" y="10" width="75" height="18" rx="3" fill="#0B132B" stroke="#00F0FF" stroke-width="1"/>
    <text x="197" y="22" text-anchor="middle" class="tag-text">[CONTROL]</text>
    <text x="15" y="48" class="archetype-desc">Multidisciplinary Math &amp;</text>
    <text x="15" y="66" class="archetype-desc">Cognitive Agentic Control.</text>
  </g>
</svg>
