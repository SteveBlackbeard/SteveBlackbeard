<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 220" width="100%" height="220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Fira+Code:wght@500;700&amp;display=swap');
      
      .main-title {
        font-family: 'Nebula', 'Orbitron', monospace;
        font-weight: 900;
        font-size: 15px;
        fill: #FFFFFF !important;
        stroke: #000000;
        stroke-width: 1.5px;
        paint-order: stroke fill;
        letter-spacing: 2.5px;
      }

      .card-title {
        font-family: 'Nebula', 'Orbitron', monospace;
        font-weight: 800;
        font-size: 12px;
        fill: #FFFFFF !important;
        stroke: #000000;
        stroke-width: 1.5px;
        paint-order: stroke fill;
        letter-spacing: 1.5px;
      }
      
      .label-text {
        font-family: 'Fira Code', monospace;
        font-size: 11px;
        fill: #CBD5E1;
        letter-spacing: 0.5px;
      }
      
      .val-text {
        font-family: 'Fira Code', monospace;
        font-weight: 700;
        font-size: 11px;
        fill: #00FF9D;
        letter-spacing: 1px;
      }
      
      .bar-bg { fill: #0F172A; rx: 3; }
      .bar-ts { fill: #00F0FF; rx: 3; filter: drop-shadow(0 0 4px #00F0FF); }
      .bar-glsl { fill: #7000FF; rx: 3; filter: drop-shadow(0 0 4px #7000FF); }
      .bar-py { fill: #00FF9D; rx: 3; filter: drop-shadow(0 0 4px #00FF9D); }
      .bar-cpp { fill: #F59E0B; rx: 3; filter: drop-shadow(0 0 4px #F59E0B); }
    </style>

    <linearGradient id="obsidian-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020306" />
      <stop offset="40%" stop-color="#070B14" />
      <stop offset="100%" stop-color="#010204" />
    </linearGradient>

    <linearGradient id="glass-sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15" />
      <stop offset="25%" stop-color="#FFFFFF" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="950" height="220" rx="14" fill="url(#obsidian-bg)" stroke="#1E293B" stroke-width="2"/>
  <path d="M 0 0 L 950 0 L 650 220 L 0 220 Z" fill="url(#glass-sheen)" opacity="0.4"/>

  <!-- Top Title Banner Header -->
  <rect x="25" y="16" width="900" height="34" rx="6" fill="#060A14" stroke="#334155" stroke-width="1.5"/>
  <text x="475" y="38" text-anchor="middle" class="main-title" fill="#FFFFFF" stroke="#000000" stroke-width="1.5" paint-order="stroke fill">SYSTEM TELEMETRY // FULL SPECTRUM METRICS &amp; ARSENAL</text>

  <!-- LEFT CARD: METRICS -->
  <g transform="translate(25, 62)">
    <rect width="435" height="142" rx="8" fill="#050914" stroke="#00F0FF" stroke-width="1.5" />
    <path d="M 0 0 L 435 0 L 300 142 L 0 142 Z" fill="url(#glass-sheen)" opacity="0.5"/>
    
    <text x="20" y="26" class="card-title" fill="#FFFFFF" stroke="#000000" stroke-width="1.5" paint-order="stroke fill">SYSTEM INTEGRITY &amp; PERFORMANCE</text>
    <line x1="20" y1="36" x2="415" y2="36" stroke="#1E293B" stroke-width="1"/>

    <text x="20" y="60" class="label-text">System Status:</text>
    <text x="220" y="60" class="val-text">[100% OPERATIONAL]</text>

    <text x="20" y="84" class="label-text">GPU Telemetry Rate:</text>
    <text x="220" y="84" class="val-text">[60 FPS BASELINE]</text>

    <text x="20" y="108" class="label-text">Compute Paradigm:</text>
    <text x="220" y="108" class="val-text">[LOCAL-FIRST SOBERANO]</text>

    <text x="20" y="132" class="label-text">Security Clearance:</text>
    <text x="220" y="132" class="val-text">[LEVEL 05 CLEARANCE]</text>
  </g>

  <!-- RIGHT CARD: LANGUAGES & STACK -->
  <g transform="translate(490, 62)">
    <rect width="435" height="142" rx="8" fill="#050914" stroke="#7000FF" stroke-width="1.5" />
    <path d="M 0 0 L 435 0 L 300 142 L 0 142 Z" fill="url(#glass-sheen)" opacity="0.5"/>

    <text x="20" y="26" class="card-title" fill="#FFFFFF" stroke="#000000" stroke-width="1.5" paint-order="stroke fill">LANGUAGE &amp; KINETICS SPECTRUM</text>
    <line x1="20" y1="36" x2="415" y2="36" stroke="#1E293B" stroke-width="1"/>

    <!-- TS -->
    <text x="20" y="58" class="label-text">TypeScript / ESNext</text>
    <rect x="180" y="48" width="200" height="10" class="bar-bg"/>
    <rect x="180" y="48" width="90" height="10" class="bar-ts"/>
    <text x="390" y="58" class="label-text">45%</text>

    <!-- GLSL -->
    <text x="20" y="80" class="label-text">WebGL / GLSL / GPU</text>
    <rect x="180" y="70" width="200" height="10" class="bar-bg"/>
    <rect x="180" y="70" width="56" height="10" class="bar-glsl"/>
    <text x="390" y="80" class="label-text">28%</text>

    <!-- Python -->
    <text x="20" y="102" class="label-text">Python (Systems)</text>
    <rect x="180" y="92" width="200" height="10" class="bar-bg"/>
    <rect x="180" y="92" width="34" height="10" class="bar-py"/>
    <text x="390" y="102" class="label-text">17%</text>

    <!-- C++ -->
    <text x="20" y="124" class="label-text">C / C++ (Low Latency)</text>
    <rect x="180" y="114" width="200" height="10" class="bar-bg"/>
    <rect x="180" y="114" width="20" height="10" class="bar-cpp"/>
    <text x="390" y="124" class="label-text">10%</text>
  </g>
</svg>
