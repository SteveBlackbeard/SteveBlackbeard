name: Ethernium Companion Telemetry Pulse

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update-companion:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Companion Telemetry Pulse
        run: python update_companion.py

      - name: Commit and Push Telemetry Pulse
        run: |
          git config --global user.name "Ethernium Seneschal Bot"
          git config --global user.email "bot@ethernium.io"
          git add ethernium-sentinel.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(telemetry): auto-update Seneschal companion telemetry pulse" && git push)
