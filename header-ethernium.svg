<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 200" width="100%" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Fira+Code:wght@500;700&amp;display=swap');
      
      .bg { fill: #04060A; }
      .grid { stroke: #0F172A; stroke-width: 1; opacity: 0.35; }
      
      .title-text {
        font-family: 'Nebula', 'Orbitron', 'Fira Code', 'Segoe UI', sans-serif;
        font-weight: 900;
        font-size: 34px;
        fill: #FFFFFF;
        stroke: #000000;
        stroke-width: 2.5px;
        paint-order: stroke fill;
        letter-spacing: 3.5px;
        filter: drop-shadow(0px 0px 12px rgba(0, 240, 255, 0.7));
      }
      
      .subtitle-text {
        font-family: 'Nebula', 'Orbitron', 'Fira Code', monospace;
        font-weight: 700;
        font-size: 14px;
        fill: #00F0FF;
        letter-spacing: 4px;
        filter: drop-shadow(0px 0px 6px rgba(112, 0, 255, 0.5));
      }
      
      .badge-text {
        font-family: 'Fira Code', monospace;
        font-size: 11px;
        fill: #94A3B8;
        letter-spacing: 2px;
      }
      
      .pulse-dot {
        animation: pulse 2s infinite;
      }
      
      @keyframes pulse {
        0% { fill: #00F0FF; opacity: 1; filter: drop-shadow(0 0 6px #00F0FF); }
        50% { fill: #7000FF; opacity: 0.3; filter: drop-shadow(0 0 2px #7000FF); }
        100% { fill: #00F0FF; opacity: 1; filter: drop-shadow(0 0 6px #00F0FF); }
      }

      .glow-border {
        animation: borderGlow 4s ease-in-out infinite alternate;
      }

      @keyframes borderGlow {
        0% { stroke: #00F0FF; }
        50% { stroke: #7000FF; }
        100% { stroke: #00F0FF; }
      }
    </style>
    
    <linearGradient id="grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020305" />
      <stop offset="50%" stop-color="#0A0E17" />
      <stop offset="100%" stop-color="#04060A" />
    </linearGradient>

    <linearGradient id="neon-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="50%" stop-color="#7000FF" />
      <stop offset="100%" stop-color="#00F0FF" />
    </linearGradient>

    <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="950" height="200" rx="12" fill="url(#grad-dark)" stroke="#1E293B" stroke-width="2"/>

  <!-- Cyber Grid Patterns -->
  <g class="grid">
    <path d="M 0 40 L 950 40 M 0 80 L 950 80 M 0 120 L 950 120 M 0 160 L 950 160" />
    <path d="M 100 0 L 100 200 M 250 0 L 250 200 M 400 0 L 400 200 M 550 0 L 550 200 M 700 0 L 700 200 M 850 0 L 850 200" />
  </g>

  <!-- Corporate Monolith Frame Borders -->
  <path d="M 20 20 L 70 20 M 20 20 L 20 70" class="glow-border" stroke-width="3.5" fill="none" />
  <path d="M 930 20 L 880 20 M 930 20 L 930 70" class="glow-border" stroke-width="3.5" fill="none" />
  <path d="M 20 180 L 70 180 M 20 180 L 20 130" class="glow-border" stroke-width="3.5" fill="none" />
  <path d="M 930 180 L 880 180 M 930 180 L 930 130" class="glow-border" stroke-width="3.5" fill="none" />

  <!-- Monolith Status Bar Header -->
  <rect x="40" y="25" width="870" height="28" rx="5" fill="#070B14" stroke="#1E293B" stroke-width="1"/>
  <circle cx="58" cy="39" r="4.5" class="pulse-dot" />
  <text x="74" y="43" class="badge-text">ETH-SOVEREIGN // DARK CORP ARCHITECTURE :: CLEARANCE 05</text>
  <text x="805" y="43" class="badge-text" fill="#00F0FF">[STATUS: ACTIVE]</text>

  <!-- Main Title: White Text with Black Border and Neon Glow -->
  <g transform="translate(475, 114)">
    <text text-anchor="middle" class="title-text">ETHERNIUM SOVEREIGN SYSTEMS</text>
  </g>

  <!-- Subtitle Text -->
  <g transform="translate(475, 152)">
    <text text-anchor="middle" class="subtitle-text">AUTONOMOUS ARCHITECTURES • GPU COMPUTE • CONTROL THEORY</text>
  </g>

  <!-- Bottom Accent Divider Line -->
  <line x1="140" y1="172" x2="810" y2="172" stroke="url(#neon-glow)" stroke-width="2.5" filter="url(#glow-heavy)"/>
</svg>
