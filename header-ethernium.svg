<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 250" width="100%" height="250">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Fira+Code:wght@500;700&amp;display=swap');
      
      .title-text {
        font-family: 'Cinzel', 'Nebula', 'Orbitron', 'Fira Code', serif;
        font-weight: 900;
        font-size: 30px;
        fill: #FFFFFF !important;
        stroke: #000000;
        stroke-width: 2.5px;
        paint-order: stroke fill;
        letter-spacing: 5px;
        filter: drop-shadow(0px 0px 14px rgba(0, 240, 255, 0.9));
      }
      
      .subtitle-text {
        font-family: 'Nebula', 'Orbitron', 'Fira Code', monospace;
        font-weight: 700;
        font-size: 13px;
        fill: #00F0FF;
        letter-spacing: 4px;
        filter: drop-shadow(0px 0px 6px rgba(112, 0, 255, 0.7));
      }
      
      .badge-text {
        font-family: 'Fira Code', monospace;
        font-size: 10.5px;
        fill: #94A3B8;
        letter-spacing: 2px;
      }
      
      .pulse-dot {
        animation: pulse 1.8s infinite;
      }
      
      @keyframes pulse {
        0% { fill: #00FF9D; opacity: 1; filter: drop-shadow(0 0 6px #00FF9D); }
        50% { fill: #00F0FF; opacity: 0.3; filter: drop-shadow(0 0 2px #00F0FF); }
        100% { fill: #00FF9D; opacity: 1; filter: drop-shadow(0 0 6px #00FF9D); }
      }

      .glow-border {
        animation: borderGlow 4s ease-in-out infinite alternate;
      }

      @keyframes borderGlow {
        0% { stroke: #00F0FF; filter: drop-shadow(0 0 4px #00F0FF); }
        50% { stroke: #7000FF; filter: drop-shadow(0 0 6px #7000FF); }
        100% { stroke: #00FF9D; filter: drop-shadow(0 0 4px #00FF9D); }
      }

      .sheen-anim {
        animation: moveSheen 5s ease-in-out infinite alternate;
      }

      @keyframes moveSheen {
        0% { transform: translateX(-350px); }
        100% { transform: translateX(350px); }
      }
    </style>

    <clipPath id="header-corner-clip">
      <rect width="950" height="250" rx="16" />
    </clipPath>

    <linearGradient id="obsidian-3d-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1726" />
      <stop offset="25%" stop-color="#050811" />
      <stop offset="60%" stop-color="#020306" />
      <stop offset="100%" stop-color="#070B14" />
    </linearGradient>

    <linearGradient id="glass-bevel-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="30%" stop-color="#00F0FF" stop-opacity="0.8" />
      <stop offset="70%" stop-color="#7000FF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00FF9D" stop-opacity="0.9" />
    </linearGradient>

    <linearGradient id="moving-sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <g clip-path="url(#header-corner-clip)">
    <rect width="950" height="250" rx="16" fill="url(#obsidian-3d-base)" stroke="#1E293B" stroke-width="2"/>

    <g class="sheen-anim">
      <polygon points="100,0 350,0 150,250 -100,250" fill="url(#moving-sheen)" />
    </g>

    <rect x="5" y="5" width="940" height="240" rx="14" fill="none" stroke="url(#glass-bevel-glow)" stroke-width="1.5" />
    <rect x="8" y="8" width="934" height="234" rx="12" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.4" />

    <!-- Corner Accents -->
    <path d="M 18 18 L 75 18 M 18 18 L 18 75" class="glow-border" stroke-width="3.5" fill="none" />
    <path d="M 932 18 L 875 18 M 932 18 L 932 75" class="glow-border" stroke-width="3.5" fill="none" />
    <path d="M 18 232 L 75 232 M 18 232 L 18 175" class="glow-border" stroke-width="3.5" fill="none" />
    <path d="M 932 232 L 875 232 M 932 232 L 932 175" class="glow-border" stroke-width="3.5" fill="none" />

    <!-- Top Status Header Bar -->
    <rect x="40" y="22" width="870" height="30" rx="8" fill="#050812" stroke="#1E293B" stroke-width="1.5"/>
    <circle cx="60" cy="37" r="4.5" class="pulse-dot" />
    <text x="76" y="41" class="badge-text">ETH-CORP // 3D OBSIDIAN SHADER MONOLITH :: CLEARANCE 05 &amp; Ω PROTOCOL</text>
    <text x="790" y="41" class="badge-text" fill="#00FF9D">[Ω_BRAND_ACTIVE]</text>

    <!-- Official Ethernium Mycelial Neural Roots Logo Image -->
    <image href="ethernium-roots-brand.png" x="250" y="60" width="450" height="135" />

    <!-- Subtitle Text -->
    <g transform="translate(475, 212)">
      <text text-anchor="middle" class="subtitle-text">SOVEREIGN ARCHITECTURES • Ω VORTEX KINETICS • CONTROL SYSTEMS</text>
    </g>

    <!-- Bottom Accent Line -->
    <line x1="140" y1="228" x2="810" y2="228" stroke="url(#glass-bevel-glow)" stroke-width="2.5" />
  </g>
</svg>
