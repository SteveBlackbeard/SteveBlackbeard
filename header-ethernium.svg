<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 220" width="100%" height="220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Fira+Code:wght@500;700&amp;display=swap');
      
      .title-text {
        font-family: 'Nebula', 'Orbitron', 'Fira Code', 'Segoe UI', sans-serif;
        font-weight: 900;
        font-size: 34px;
        fill: #FFFFFF !important;
        stroke: #000000;
        stroke-width: 3px;
        paint-order: stroke fill;
        letter-spacing: 4px;
        filter: drop-shadow(0px 0px 14px rgba(0, 240, 255, 0.8));
      }
      
      .subtitle-text {
        font-family: 'Nebula', 'Orbitron', 'Fira Code', monospace;
        font-weight: 700;
        font-size: 13.5px;
        fill: #00F0FF;
        letter-spacing: 4px;
        filter: drop-shadow(0px 0px 6px rgba(112, 0, 255, 0.6));
      }
      
      .badge-text {
        font-family: 'Fira Code', monospace;
        font-size: 10.5px;
        fill: #94A3B8;
        letter-spacing: 2px;
      }
      
      .pulse-dot {
        animation: pulse 1.8s infinite;
      }
      
      @keyframes pulse {
        0% { fill: #00FF9D; opacity: 1; filter: drop-shadow(0 0 6px #00FF9D); }
        50% { fill: #00F0FF; opacity: 0.3; filter: drop-shadow(0 0 2px #00F0FF); }
        100% { fill: #00FF9D; opacity: 1; filter: drop-shadow(0 0 6px #00FF9D); }
      }

      .glow-border {
        animation: borderGlow 4s ease-in-out infinite alternate;
      }

      @keyframes borderGlow {
        0% { stroke: #00F0FF; filter: drop-shadow(0 0 4px #00F0FF); }
        50% { stroke: #7000FF; filter: drop-shadow(0 0 6px #7000FF); }
        100% { stroke: #00FF9D; filter: drop-shadow(0 0 4px #00FF9D); }
      }

      .sheen-anim {
        animation: moveSheen 5s ease-in-out infinite alternate;
      }

      @keyframes moveSheen {
        0% { transform: translateX(-300px); }
        100% { transform: translateX(300px); }
      }
    </style>

    <!-- 3D Obsidian Crystal Shader Gradients -->
    <linearGradient id="obsidian-3d-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1726" />
      <stop offset="25%" stop-color="#050811" />
      <stop offset="60%" stop-color="#020306" />
      <stop offset="100%" stop-color="#070B14" />
    </linearGradient>

    <linearGradient id="glass-bevel-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="30%" stop-color="#00F0FF" stop-opacity="0.8" />
      <stop offset="70%" stop-color="#7000FF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00FF9D" stop-opacity="0.9" />
    </linearGradient>

    <linearGradient id="moving-sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Outer 3D Rounded Obsidian Frame -->
  <rect width="950" height="220" rx="16" fill="url(#obsidian-3d-base)" stroke="#1E293B" stroke-width="2"/>

  <!-- Moving 3D Light Sheen Shader Layer -->
  <g class="sheen-anim">
    <polygon points="100,0 350,0 150,220 -100,220" fill="url(#moving-sheen)" />
  </g>

  <!-- 3D Bevel White Glow Border (Rounded Corners) -->
  <rect x="5" y="5" width="940" height="210" rx="14" fill="none" stroke="url(#glass-bevel-glow)" stroke-width="1.5" />
  <rect x="8" y="8" width="934" height="204" rx="12" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.4" />

  <!-- Corner Accents -->
  <path d="M 18 18 L 75 18 M 18 18 L 18 75" class="glow-border" stroke-width="3.5" fill="none" />
  <path d="M 932 18 L 875 18 M 932 18 L 932 75" class="glow-border" stroke-width="3.5" fill="none" />
  <path d="M 18 202 L 75 202 M 18 202 L 18 145" class="glow-border" stroke-width="3.5" fill="none" />
  <path d="M 932 202 L 875 202 M 932 202 L 932 145" class="glow-border" stroke-width="3.5" fill="none" />

  <!-- Top Monolith Status Header Bar (Rounded Corners) -->
  <rect x="40" y="24" width="870" height="30" rx="8" fill="#050812" stroke="#1E293B" stroke-width="1.5"/>
  <circle cx="60" cy="39" r="4.5" class="pulse-dot" />
  <text x="76" y="43" class="badge-text">ETH-CORP // 3D OBSIDIAN SHADER MONOLITH :: CLEARANCE 05</text>
  <text x="790" y="43" class="badge-text" fill="#00FF9D">[3D_SHADER_ACTIVE]</text>

  <!-- Main Title: White Nebula Font with Black Stroke & Glowing Aura -->
  <g transform="translate(475, 120)">
    <text text-anchor="middle" class="title-text" fill="#FFFFFF" stroke="#000000" stroke-width="3" paint-order="stroke fill">ETHERNIUM SOVEREIGN SYSTEMS</text>
  </g>

  <!-- Subtitle Text -->
  <g transform="translate(475, 160)">
    <text text-anchor="middle" class="subtitle-text">AUTONOMOUS ARCHITECTURES • GPU ENGINE • CONTROL SYSTEMS</text>
  </g>

  <!-- Bottom Accent Line -->
  <line x1="140" y1="182" x2="810" y2="182" stroke="url(#glass-bevel-glow)" stroke-width="2.5" />
</svg>
